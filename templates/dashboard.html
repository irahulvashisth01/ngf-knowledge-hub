<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard - NotesHub</title>

<link rel="icon" href="{{ url_for('static', filename='icons/image.png') }}">

<!-- FONT AWESOME -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ===== RESET ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

/* ===== BODY ===== */
body {
  background: linear-gradient(135deg, #4f46e5, #06b6d4);
  min-height: 100vh;
  color: white;
}

/* ===== NAVBAR ===== */
.navbar {
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-size: 22px;
  font-weight: bold;
}

.nav-links a {
  color: white;
  margin-left: 15px;
  text-decoration: none;
}

/* ===== CONTAINER ===== */
.container {
  padding: 30px;
}

/* ===== HEADER ===== */
.header h2 {
  margin-bottom: 20px;
}

/* ===== GRID ===== */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
}

/* ===== CARD ===== */
.card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(12px);
  padding: 40px;
  border-radius: 15px;
  text-align: center;
  font-size: 20px;
  text-decoration: none;
  color: white;
  transition: 0.3s;
  box-shadow: 0 8px 25px rgba(0,0,0,0.2);
}

.card:hover {
  transform: translateY(-8px);
}

/* ===== BIG CARD ===== */
.big {
  font-size: 24px;
  font-weight: bold;
}

/* ===== BUTTON ===== */
.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 25px;
  background: #10b981;
  color: white;
  border-radius: 8px;
  text-decoration: none;
  transition: 0.3s;
}

.btn:hover {
  background: #059669;
}

/* ===== MOBILE ===== */
@media(max-width: 600px) {
  .container {
    padding: 20px;
  }
}

</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">📚 NotesHub</div>

  <div class="nav-links">
    <a href="/btech">Notes</a>
    <a href="/upload">Upload</a>
    <a href="/logout">Logout</a>
    <a href="/contact">Contact</a>
    <a href="/privacy">Privacy</a>
    <a href="/terms">Terms</a>
    <a href="/disclaimer">Disclaimer</a>
  </div>
</div>

<!-- CONTENT -->
<div class="container">

  <div class="header">
    <h2>Welcome {{session['user']}} 👋</h2>
  </div>

  <div class="grid">

    <a href="/btech" class="card big">
      📦 B.Tech Notes
    </a>

    <a href="/upload" class="card">
      ⬆ Upload Notes
    </a>

    <a href="/notes" class="card">
      📄 All Notes
    </a>

  </div>

  {% if session['role'] == 'admin' %}
    <a href="/admin" class="btn">👑 Admin Panel</a>
  {% endif %}

</div>

</body>
</html>
