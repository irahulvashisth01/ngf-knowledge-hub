<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard - NotesHub</title>

<link rel="icon" href="{{ url_for('static', filename='icons/image.png') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<meta name="theme-color" content="#111827">

<style>

/* ===== RESET ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: linear-gradient(135deg, #4f46e5, #06b6d4);
  min-height: 100vh;
  color: white;
  padding-top: 70px;
}

/* ===== NAVBAR ===== */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(17,24,39,0.9);
  backdrop-filter: blur(10px);
  padding: 14px 25px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 1000;
}

.logo {
  font-size: 22px;
  font-weight: bold;
}

.nav-links a {
  color: #d1d5db;
  margin-left: 15px;
  text-decoration: none;
  transition: 0.3s;
}

.nav-links a:hover {
  color: white;
}

/* ===== CONTAINER ===== */
.container {
  padding: 30px;
  max-width: 1200px;
  margin: auto;
}

/* HEADER */
.header h2 {
  margin-bottom: 25px;
  font-size: 28px;
}

/* ===== GRID ===== */
.grid {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 25px;
}

/* ===== CARD ===== */
.card {
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(15px);
  padding: 35px;
  border-radius: 18px;
  text-align: center;
  text-decoration: none;
  color: white;
  transition: 0.3s;
  box-shadow: 0 8px 25px rgba(0,0,0,0.2);
}

.card i {
  font-size: 30px;
  margin-bottom: 10px;
}

.card h3 {
  margin-top: 10px;
}

.card:hover {
  transform: translateY(-8px) scale(1.03);
}

/* MAIN CARD */
.big {
  grid-column: span 2;
  font-size: 22px;
  font-weight: bold;
}

/* BUTTON */
.btn {
  display: inline-block;
  margin-top: 25px;
  padding: 12px 25px;
  background: linear-gradient(45deg,#10b981,#059669);
  color: white;
  border-radius: 10px;
  text-decoration: none;
  transition: 0.3s;
}

.btn:hover {
  transform: translateY(-2px);
}

/* ===== MOBILE APP STYLE ===== */
.mobile-nav {
  display: none;
}

@media(max-width: 768px) {

  body {
    padding-bottom: 70px;
  }

  .grid {
    grid-template-columns: 1fr;
  }

  .big {
    grid-column: span 1;
  }

  .nav-links {
    display: none;
  }

  .container {
    padding: 20px;
  }

  .header h2 {
    font-size: 22px;
  }

  /* MOBILE NAV */
  .mobile-nav {
    display: flex;
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #111827;
    justify-content: space-around;
    padding: 10px 0;
  }

  .mobile-nav a {
    color: #9ca3af;
    text-align: center;
    font-size: 12px;
    text-decoration: none;
  }

  .mobile-nav i {
    display: block;
    font-size: 18px;
  }

}

</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">📚 NotesHub</div>

  <div class="nav-links">
    <a href="/btech">Notes</a>
    <a href="/upload">Upload</a>
    <a href="/logout">Logout</a>
  </div>
</div>

<!-- CONTENT -->
<div class="container">

  <div class="header">
    <h2>Welcome {{session['user']}} 👋</h2>
  </div>

  <div class="grid">

    <a href="/btech" class="card big">
      <i class="fas fa-book"></i>
      <h3>B.Tech Notes</h3>
    </a>

    <a href="/upload" class="card">
      <i class="fas fa-upload"></i>
      <h3>Upload Notes</h3>
    </a>

    <a href="/notes" class="card">
      <i class="fas fa-file-alt"></i>
      <h3>All Notes</h3>
    </a>

  </div>

  {% if session['role'] == 'admin' %}
    <a href="/admin" class="btn">👑 Admin Panel</a>
  {% endif %}

</div>

<!-- MOBILE NAV -->
<div class="mobile-nav">
  <a href="/"><i class="fas fa-home"></i>Home</a>
  <a href="/btech"><i class="fas fa-book"></i>Notes</a>
  <a href="/upload"><i class="fas fa-upload"></i>Upload</a>
  <a href="/dashboard"><i class="fas fa-user"></i>Profile</a>
</div>

</body>
</html>
