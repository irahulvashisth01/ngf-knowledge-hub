{% extends "base.html" %}
{% block content %}

<div class="form-box">
  <h2>Login</h2>

  <form method="POST">
    <input name="name" placeholder="Name" required>
    <input name="email" placeholder="Email" required>

    <button class="btn">Login</button>
  </form>

  <p><a href="/register">Create Account</a></p>
</div>

{% endblock %}
