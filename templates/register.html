{% extends "base.html" %}
{% block content %}

<div class="form-box">
  <h2>Register</h2>

  <form method="POST">
    <input name="name" placeholder="Name" required>
    <input name="email" placeholder="Email" required>
    <input name="mobile" placeholder="Mobile" required>

    <button class="btn">Register</button>
  </form>

</div>

{% endblock %}
