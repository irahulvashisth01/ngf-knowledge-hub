{% extends "base.html" %}

{% block title %}Upload Notes | NGF Knowledge Hub{% endblock %}

{% block content %}

<section class="upload-page">

  <div class="upload-container">

    <div class="upload-card">

      <h2>⬆ Upload Notes</h2>

      <form method="POST" enctype="multipart/form-data" id="uploadForm">

        <!-- SEM -->
        <label>Semester</label>
        <select name="semester" id="semester" onchange="updateSubjects()">
          {% for i in range(1,9) %}
          <option value="{{i}}">Semester {{i}}</option>
          {% endfor %}
        </select>

        <!-- SUBJECT -->
        <label>Subject</label>
        <select name="subject" id="subject"></select>

        <!-- FILE -->
        <label>Upload File</label>

        <div class="drop-area" id="dropArea">
          <i class="fas fa-cloud-upload-alt"></i>
          <p>Click or Drag & Drop File</p>
          <input type="file" name="file" id="fileInput" required>
        </div>

        <div class="file-info" id="fileInfo"></div>
        <div class="error" id="errorMsg"></div>

        <!-- PROGRESS -->
        <div class="progress-container" id="progressContainer">
          <div class="progress-bar" id="progressBar"></div>
        </div>

        <button class="btn primary">Upload Notes</button>

      </form>

    </div>

  </div>

</section>

<script>
const SUBJECTS = {{ subjects | tojson if subjects else '{}' }};

function updateSubjects(){
  let sem = document.getElementById("semester").value;
  let subject = document.getElementById("subject");
  subject.innerHTML="";

  if(SUBJECTS[sem]){
    SUBJECTS[sem].forEach(s=>{
      let opt=document.createElement("option");
      opt.value=s;
      opt.text=s;
      subject.appendChild(opt);
    });
  }
}

window.onload=updateSubjects;

/* FILE VALIDATION */
const fileInput=document.getElementById("fileInput");
const fileInfo=document.getElementById("fileInfo");
const errorMsg=document.getElementById("errorMsg");

fileInput.addEventListener("change",()=>{
  let file=fileInput.files[0];

  if(file){
    if(file.size > 100*1024*1024){
      errorMsg.innerText="File too large (Max 100MB)";
      fileInput.value="";
      return;
    }

    errorMsg.innerText="";
    fileInfo.innerText="Selected: "+file.name;
  }
});

/* DRAG DROP */
const dropArea=document.getElementById("dropArea");

dropArea.addEventListener("dragover",(e)=>{
  e.preventDefault();
  dropArea.classList.add("active");
});

dropArea.addEventListener("dragleave",()=>{
  dropArea.classList.remove("active");
});

dropArea.addEventListener("drop",(e)=>{
  e.preventDefault();
  dropArea.classList.remove("active");
  fileInput.files=e.dataTransfer.files;
});

/* PROGRESS */
document.getElementById("uploadForm").addEventListener("submit",()=>{
  let bar=document.getElementById("progressBar");
  let box=document.getElementById("progressContainer");

  box.style.display="block";

  let w=0;
  let i=setInterval(()=>{
    if(w>=95) clearInterval(i);
    w+=5;
    bar.style.width=w+"%";
  },150);
});
</script>

{% endblock %}
