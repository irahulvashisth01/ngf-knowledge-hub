<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Upload Notes - NotesHub</title>

<link rel="icon" href="{{ url_for('static', filename='icons/image.png') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ===== GLOBAL ===== */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
  background:#f8fafc;
  display:flex;
  flex-direction:column;
  min-height:100vh;
  padding-top:70px;
}

/* ===== NAVBAR ===== */
.navbar{
  position:fixed;
  top:0;width:100%;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(12px);
  padding:14px 25px;
  display:flex;
  justify-content:space-between;
}

.logo{font-size:20px;font-weight:600;}

.nav-links a{
  margin-left:15px;
  text-decoration:none;
  color:#334155;
}

/* ===== MAIN ===== */
.main{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:40px 15px;
}

/* ===== CARD ===== */
.upload-card{
  width:100%;
  max-width:450px;
  background:white;
  border-radius:20px;
  padding:30px;
  box-shadow:0 15px 40px rgba(0,0,0,0.1);
  animation:fadeUp 0.5s ease;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

/* INPUT */
label{margin-top:15px;display:block;}

select{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
}

/* DROP AREA */
.drop-area{
  margin-top:10px;
  padding:25px;
  border:2px dashed #cbd5f5;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
  position:relative;
  transition:0.3s;
}

.drop-area.dragover{
  background:#eef2ff;
  border-color:#6366f1;
}

.drop-area i{
  font-size:28px;
  margin-bottom:10px;
}

.drop-area input{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
  opacity:0;
  cursor:pointer;
}

/* FILE INFO */
.file-info{
  margin-top:10px;
  text-align:center;
  font-size:14px;
}

/* ERROR */
.error{
  color:red;
  text-align:center;
  margin-top:10px;
}

/* BUTTON */
.btn{
  width:100%;
  margin-top:20px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#6366f1,#06b6d4);
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{transform:translateY(-2px);}

/* PROGRESS */
.progress-container{
  margin-top:15px;
  background:#e2e8f0;
  border-radius:10px;
  display:none;
}

.progress-bar{
  height:10px;
  width:0%;
  background:linear-gradient(135deg,#10b981,#059669);
  transition:0.3s;
}

/* FOOTER */
.footer{
  background:#0f172a;
  color:white;
  padding:40px 20px;
}

.footer-container{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
}

.footer a{
  color:#94a3b8;
  display:block;
}

/* ===== MOBILE ===== */
.mobile-nav{display:none;}

@media(max-width:768px){

  .grid{grid-template-columns:1fr;}
  .nav-links{display:none;}

  body{padding-bottom:70px;}

  .mobile-nav{
    display:flex;
    position:fixed;
    bottom:0;width:100%;
    background:#111827;
    justify-content:space-around;
    padding:10px 0;
  }

  .mobile-nav a{
    color:#9ca3af;
    font-size:12px;
    text-decoration:none;
    text-align:center;
  }

  .mobile-nav i{
    display:block;
    font-size:18px;
  }

}

/* MOBILE */
@media(max-width:768px){
  .footer-container{grid-template-columns:1fr;}
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">📚 NotesHub</div>
  <div class="nav-links">
    <a href="/dashboard">Dashboard</a>
    <a href="/btech">Notes</a>
    <a href="/logout">Logout</a>
  </div>
</div>

<div class="main">
  <div class="upload-card">

    <h2>⬆ Upload Notes</h2>

    <form method="POST" enctype="multipart/form-data" id="uploadForm">

      <label>Semester</label>
      <select name="semester" id="semester" onchange="updateSubjects()">
        {% for i in range(1,9) %}
        <option value="{{i}}">Semester {{i}}</option>
        {% endfor %}
      </select>

      <label>Subject</label>
      <select name="subject" id="subject"></select>

      <label>Upload File</label>

      <div class="drop-area" id="dropArea">
        <i class="fas fa-cloud-upload-alt"></i>
        <p>Click or Drag & Drop</p>
        <input type="file" name="file" id="fileInput" required>
      </div>

      <div class="file-info" id="fileInfo"></div>
      <div class="error" id="errorMsg"></div>

      <div class="progress-container" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <button class="btn">Upload</button>

    </form>

  </div>
</div>

<footer class="footer">
  <div class="footer-container">
    <div><h3>📚 NotesHub</h3></div>
    <div><a href="/dashboard">Home</a></div>
    <div><a href="/privacy">Privacy</a></div>
    <div><a href="#">Instagram</a></div>
  </div>
</footer>

<script>

/* SUBJECT */
const SUBJECTS = {{ subjects | tojson if subjects else '{}' }};

function updateSubjects(){
  let sem = document.getElementById("semester").value;
  let subject = document.getElementById("subject");
  subject.innerHTML="";

  if(SUBJECTS[sem]){
    SUBJECTS[sem].forEach(s=>{
      let opt=document.createElement("option");
      opt.value=s; opt.text=s;
      subject.appendChild(opt);
    });
  }
}

window.onload=updateSubjects;

/* FILE VALIDATION */
const fileInput=document.getElementById("fileInput");
const fileInfo=document.getElementById("fileInfo");
const errorMsg=document.getElementById("errorMsg");

fileInput.addEventListener("change",()=>{
  let file=fileInput.files[0];

  if(file){
    if(file.size > 10*1024*1024){
      errorMsg.innerText="File too large (Max 10MB)";
      fileInput.value="";
      return;
    }

    errorMsg.innerText="";
    fileInfo.innerText="Selected: "+file.name;
  }
});

/* DRAG DROP */
const dropArea=document.getElementById("dropArea");

dropArea.addEventListener("dragover",(e)=>{
  e.preventDefault();
  dropArea.classList.add("dragover");
});

dropArea.addEventListener("dragleave",()=>{
  dropArea.classList.remove("dragover");
});

dropArea.addEventListener("drop",(e)=>{
  e.preventDefault();
  dropArea.classList.remove("dragover");
  fileInput.files=e.dataTransfer.files;
});

/* PROGRESS */
document.getElementById("uploadForm").addEventListener("submit",()=>{
  let bar=document.getElementById("progressBar");
  let box=document.getElementById("progressContainer");
  box.style.display="block";

  let w=0;
  let i=setInterval(()=>{
    if(w>=95) clearInterval(i);
    w+=5;
    bar.style.width=w+"%";
  },150);
});

</script>

<!-- MOBILE NAV -->
<div class="mobile-nav">
  <a href="/dashboard"><i class="fas fa-home"></i>Home</a>
  <a href="/btech"><i class="fas fa-book"></i>Notes</a>
  <a href="/login"><i class="fas fa-user"></i>Login</a>
</div>

</body>
</html>
