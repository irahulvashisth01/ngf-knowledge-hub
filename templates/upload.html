<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Upload Notes - NotesHub</title>

<link rel="icon" href="{{ url_for('static', filename='icons/image.png') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<meta name="theme-color" content="#111827">

<style>

/* ===== RESET ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: linear-gradient(135deg, #4f46e5, #06b6d4);
  color: white;
  padding-top: 70px;
}

/* ===== NAVBAR ===== */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(17,24,39,0.9);
  backdrop-filter: blur(10px);
  padding: 14px 25px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 1000;
}

.logo {
  font-size: 22px;
  font-weight: bold;
}

.nav-links a {
  color: #d1d5db;
  margin-left: 15px;
  text-decoration: none;
}

.nav-links a:hover {
  color: white;
}

/* ===== MAIN ===== */
.main {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 40px 20px;
}

/* ===== BOX ===== */
.upload-box {
  width: 420px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(18px);
  padding: 30px;
  border-radius: 18px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* TITLE */
.upload-box h2 {
  text-align: center;
  margin-bottom: 20px;
}

/* LABEL */
label {
  display: block;
  margin-top: 15px;
  margin-bottom: 5px;
}

/* INPUT */
select {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  outline: none;
}

/* DROP AREA */
.drop-area {
  margin-top: 10px;
  padding: 25px;
  border: 2px dashed rgba(255,255,255,0.5);
  border-radius: 12px;
  text-align: center;
  cursor: pointer;
  transition: 0.3s;
}

.drop-area:hover {
  background: rgba(255,255,255,0.1);
  transform: scale(1.02);
}

.drop-area i {
  font-size: 30px;
  margin-bottom: 10px;
}

/* FILE INPUT */
input[type="file"] {
  display: none;
}

/* FILE NAME */
.file-name {
  margin-top: 10px;
  font-size: 14px;
  color: #e5e7eb;
  text-align: center;
}

/* BUTTON */
.btn {
  width: 100%;
  margin-top: 20px;
  padding: 12px;
  background: linear-gradient(45deg,#10b981,#059669);
  border: none;
  border-radius: 10px;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  transform: translateY(-2px);
}

/* ===== MOBILE APP STYLE ===== */
.mobile-nav {
  display: none;
}

@media(max-width: 768px) {

  body {
    padding-bottom: 70px;
  }

  .upload-box {
    width: 100%;
  }

  .nav-links {
    display: none;
  }

  /* MOBILE NAV */
  .mobile-nav {
    display: flex;
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #111827;
    justify-content: space-around;
    padding: 10px 0;
  }

  .mobile-nav a {
    color: #9ca3af;
    text-align: center;
    font-size: 12px;
    text-decoration: none;
  }

  .mobile-nav i {
    display: block;
    font-size: 18px;
  }

}

</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">📚 NotesHub</div>

  <div class="nav-links">
    <a href="/dashboard">Dashboard</a>
    <a href="/btech">Notes</a>
    <a href="/logout">Logout</a>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="upload-box">

    <h2>⬆ Upload Notes</h2>

    <form method="POST" enctype="multipart/form-data">

      <label>Semester</label>
      <select name="semester" id="semester" onchange="updateSubjects()">
        {% for i in range(1,9) %}
          <option value="{{i}}">Semester {{i}}</option>
        {% endfor %}
      </select>

      <label>Subject</label>
      <select name="subject" id="subject"></select>

      <label>Upload File</label>
      <div class="drop-area" onclick="document.getElementById('fileInput').click()">
        <i class="fas fa-cloud-upload-alt"></i>
        <p>Click or Drag & Drop file</p>
      </div>

      <input type="file" name="file" id="fileInput" required>

      <div class="file-name" id="fileName"></div>

      <button class="btn">Upload</button>

    </form>

  </div>

</div>

<!-- MOBILE NAV -->
<div class="mobile-nav">
  <a href="/"><i class="fas fa-home"></i>Home</a>
  <a href="/btech"><i class="fas fa-book"></i>Notes</a>
  <a href="/upload"><i class="fas fa-upload"></i>Upload</a>
  <a href="/dashboard"><i class="fas fa-user"></i>Profile</a>
</div>

<script>

/* SUBJECT LOGIC */
const SUBJECTS = {{ subjects | tojson }};

function updateSubjects() {
  let sem = document.getElementById("semester").value;
  let subjectDropdown = document.getElementById("subject");

  subjectDropdown.innerHTML = "";

  SUBJECTS[sem].forEach(sub => {
    let option = document.createElement("option");
    option.value = sub;
    option.text = sub;
    subjectDropdown.appendChild(option);
  });
}

window.onload = updateSubjects;

/* FILE NAME */
document.getElementById("fileInput").addEventListener("change", function() {
  let fileName = this.files[0]?.name || "";
  document.getElementById("fileName").innerText = fileName;
});

</script>

</body>
</html>
