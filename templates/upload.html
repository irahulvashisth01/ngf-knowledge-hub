<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Upload Notes - NotesHub</title>

<link rel="icon" href="{{ url_for('static', filename='icons/image.png') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<meta name="theme-color" content="#0f172a">

<style>

/* ===== GLOBAL ===== */
html, body {
  overflow-x: hidden;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: linear-gradient(135deg, #4f46e5, #06b6d4);
  padding-top: 70px;
  color: white;
}

/* ===== NAVBAR ===== */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  backdrop-filter: blur(12px);
  background: rgba(15,23,42,0.7);
  padding: 14px 25px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 1000;
}

.logo {
  font-size: 20px;
  font-weight: 600;
}

.nav-links a {
  color: #cbd5f5;
  margin-left: 15px;
  text-decoration: none;
}

/* ===== MAIN ===== */
.main {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 40px 15px;
}

/* ===== CARD ===== */
.upload-card {
  width: 100%;
  max-width: 450px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 30px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.3);
}

.upload-card h2 {
  text-align: center;
  margin-bottom: 20px;
}

/* ===== INPUT ===== */
label {
  display: block;
  margin-top: 15px;
  margin-bottom: 6px;
  font-size: 14px;
}

select {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

/* ===== DROP AREA ===== */
.drop-area {
  position: relative;
  margin-top: 10px;
  padding: 30px;
  border: 2px dashed rgba(255,255,255,0.6);
  border-radius: 12px;
  text-align: center;
  cursor: pointer;
  transition: 0.3s;
}

.drop-area:hover {
  background: rgba(255,255,255,0.1);
}

.drop-area i {
  font-size: 30px;
  margin-bottom: 10px;
}

/* FILE INPUT FIX */
.drop-area input {
  position: absolute;
  width: 100%;
  height: 100%;
  opacity: 0;
  cursor: pointer;
  top: 0;
  left: 0;
}

/* FILE INFO */
.file-info {
  margin-top: 10px;
  font-size: 14px;
  color: #e5e7eb;
  text-align: center;
}

/* PROGRESS BAR */
.progress-container {
  margin-top: 15px;
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
  overflow: hidden;
  display: none;
}

.progress-bar {
  height: 10px;
  width: 0%;
  background: #10b981;
  transition: 0.3s;
}

/* BUTTON */
.btn {
  width: 100%;
  margin-top: 20px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg,#10b981,#059669);
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  transform: translateY(-2px);
}

/* MOBILE */
@media(max-width: 768px) {
  .nav-links {
    display: none;
  }
}

</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">📚 NotesHub</div>
  <div class="nav-links">
    <a href="/dashboard">Dashboard</a>
    <a href="/btech">Notes</a>
    <a href="/logout">Logout</a>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="upload-card">

    <h2>⬆ Upload Notes</h2>

    <form method="POST" enctype="multipart/form-data" id="uploadForm">

      <label>Semester</label>
      <select name="semester" id="semester" onchange="updateSubjects()">
        {% for i in range(1,9) %}
          <option value="{{i}}">Semester {{i}}</option>
        {% endfor %}
      </select>

      <label>Subject</label>
      <select name="subject" id="subject"></select>

      <label>Upload File</label>

      <!-- SAFE MOBILE FILE INPUT -->
      <div class="drop-area">
        <i class="fas fa-cloud-upload-alt"></i>
        <p>Click to Upload File</p>
        <input type="file" name="file" id="fileInput" accept=".pdf,.doc,.docx" required>
      </div>

      <div class="file-info" id="fileInfo"></div>

      <div class="progress-container" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <button class="btn">Upload</button>

    </form>

  </div>

</div>

<script>

/* SUBJECTS */
const SUBJECTS = {{ subjects | tojson }};

function updateSubjects() {
  let sem = document.getElementById("semester").value;
  let subject = document.getElementById("subject");

  subject.innerHTML = "";

  SUBJECTS[sem].forEach(sub => {
    let option = document.createElement("option");
    option.value = sub;
    option.text = sub;
    subject.appendChild(option);
  });
}

window.onload = updateSubjects;

/* FILE INFO */
const fileInput = document.getElementById("fileInput");
const fileInfo = document.getElementById("fileInfo");

fileInput.addEventListener("change", () => {
  let file = fileInput.files[0];
  if(file) {
    fileInfo.innerText = "Selected: " + file.name;
  }
});

/* PROGRESS (FAKE UI FOR UX) */
const form = document.getElementById("uploadForm");
const progressBar = document.getElementById("progressBar");
const progressContainer = document.getElementById("progressContainer");

form.addEventListener("submit", function() {
  progressContainer.style.display = "block";

  let width = 0;
  let interval = setInterval(() => {
    if(width >= 90) clearInterval(interval);
    width += 10;
    progressBar.style.width = width + "%";
  }, 200);
});

</script>

</body>
</html>
