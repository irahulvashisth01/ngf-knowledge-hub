<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>B.Tech CSE - NotesHub</title>

<link rel="icon" href="{{ url_for('static', filename='icons/image.png') }}">

<!-- FONT AWESOME -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ===== RESET ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

/* ===== BODY ===== */
body {
  min-height: 100vh;
  background: linear-gradient(135deg, #4f46e5, #06b6d4);
  color: white;
}

/* ===== NAVBAR ===== */
.navbar {
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-size: 22px;
  font-weight: bold;
}

.nav-links a {
  color: white;
  margin-left: 15px;
  text-decoration: none;
}

/* ===== CONTAINER ===== */
.container {
  padding: 30px;
}

/* ===== HEADER ===== */
.container h2 {
  margin-bottom: 20px;
  font-size: 28px;
}

/* ===== GRID ===== */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 20px;
}

/* ===== CARD ===== */
.card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(12px);
  padding: 40px;
  border-radius: 15px;
  text-align: center;
  font-size: 20px;
  text-decoration: none;
  color: white;
  transition: 0.3s;
  box-shadow: 0 8px 25px rgba(0,0,0,0.2);
}

.card:hover {
  transform: translateY(-8px) scale(1.03);
}

/* ===== MOBILE ===== */
@media(max-width: 600px) {
  .container {
    padding: 20px;
  }

  .card {
    padding: 25px;
    font-size: 18px;
  }
}

</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">📚 NotesHub</div>

  <div class="nav-links">
    <a href="/dashboard">Dashboard</a>
    <a href="/upload">Upload</a>
    <a href="/logout">Logout</a>
    <a href="/contact">Contact</a>
    <a href="/privacy">Privacy</a>
    <a href="/terms">Terms</a>
    <a href="/disclaimer">Disclaimer</a>
  </div>
</div>

<!-- CONTENT -->
<div class="container">

  <h2>🎓 B.Tech CSE - All Semesters</h2>

  <div class="grid">
    {% for i in range(1,9) %}
      <a href="/semester/{{i}}" class="card">
        📘 Semester {{i}}
      </a>
    {% endfor %}
  </div>

</div>

</body>
</html>
