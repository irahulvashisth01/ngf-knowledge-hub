{% extends "base.html" %}

{% block title %}Semesters | NGF Knowledge Hub{% endblock %}

{% block content %}

<section class="semester-page">

  <div class="semester-header">
    <h1>🎓 B.Tech CSE Notes</h1>
    <p>Select your semester to explore notes</p>
  </div>

  <div class="semester-grid">

    {% for i in range(1,9) %}
    <div class="semester-card">
      <i class="fas fa-book-open"></i>
      <h3>Semester {{ i }}</h3>
      <p>Subjects & Notes</p>
      <a href="/semester/{{i}}" class="btn primary">Explore</a>
    </div>
    {% endfor %}

  </div>

</section>

{% endblock %}
