<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Semesters - NotesHub</title>

<link rel="icon" href="{{ url_for('static', filename='icons/image.png') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<meta name="theme-color" content="#111827">

<style>

/* ===== RESET ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: linear-gradient(135deg, #4f46e5, #06b6d4);
  color: white;
  padding-top: 70px;
}

/* ===== NAVBAR ===== */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(17,24,39,0.9);
  backdrop-filter: blur(10px);
  padding: 14px 25px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 1000;
}

.logo {
  font-size: 22px;
  font-weight: bold;
}

.nav-links a {
  color: #d1d5db;
  margin-left: 15px;
  text-decoration: none;
  transition: 0.3s;
}

.nav-links a:hover {
  color: white;
}

/* ===== WRAPPER ===== */
.semester-wrapper {
  padding: 40px 20px;
  text-align: center;
  max-width: 1200px;
  margin: auto;
}

.semester-header h1 {
  font-size: 34px;
}

.semester-header p {
  color: #e5e7eb;
  margin: 10px 0 30px;
}

/* ===== GRID ===== */
.semester-grid {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 25px;
}

/* ===== CARD ===== */
.semester-card {
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(15px);
  padding: 30px;
  border-radius: 18px;
  transition: 0.3s;
  box-shadow: 0 8px 25px rgba(0,0,0,0.2);
}

.semester-card:hover {
  transform: translateY(-8px) scale(1.04);
}

.sem-icon {
  font-size: 40px;
  margin-bottom: 10px;
}

.semester-card h3 {
  margin: 10px 0;
}

/* BUTTON */
.sem-btn {
  display: inline-block;
  margin-top: 12px;
  padding: 10px 18px;
  background: linear-gradient(45deg,#3b82f6,#6366f1);
  color: white;
  border-radius: 10px;
  text-decoration: none;
  transition: 0.3s;
}

.sem-btn:hover {
  transform: translateY(-2px);
}

/* ===== MOBILE APP STYLE ===== */
.mobile-nav {
  display: none;
}

@media(max-width: 768px) {

  body {
    padding-bottom: 70px;
  }

  .semester-grid {
    grid-template-columns: 1fr;
  }

  .nav-links {
    display: none;
  }

  .semester-header h1 {
    font-size: 26px;
  }

  /* MOBILE NAV */
  .mobile-nav {
    display: flex;
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #111827;
    justify-content: space-around;
    padding: 10px 0;
  }

  .mobile-nav a {
    color: #9ca3af;
    text-align: center;
    font-size: 12px;
    text-decoration: none;
  }

  .mobile-nav i {
    display: block;
    font-size: 18px;
  }

}

</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">📚 NotesHub</div>

  <div class="nav-links">
    <a href="/dashboard">Dashboard</a>
    <a href="/btech">Notes</a>
    <a href="/logout">Logout</a>
  </div>
</div>

<!-- CONTENT -->
<div class="semester-wrapper">

  <div class="semester-header">
    <h1>🎓 B.Tech CSE Notes</h1>
    <p>Select your semester to explore notes</p>
  </div>

  <div class="semester-grid">

    {% for i in range(1,9) %}
    <div class="semester-card">
      <div class="sem-icon">📘</div>
      <h3>Semester {{ i }}</h3>
      <p>Explore subjects & notes</p>
      <a href="/semester/{{i}}" class="sem-btn">Explore</a>
    </div>
    {% endfor %}

  </div>

</div>

<!-- MOBILE NAV -->
<div class="mobile-nav">
  <a href="/"><i class="fas fa-home"></i>Home</a>
  <a href="/btech"><i class="fas fa-book"></i>Notes</a>
  <a href="/upload"><i class="fas fa-upload"></i>Upload</a>
  <a href="/dashboard"><i class="fas fa-user"></i>Profile</a>
</div>

</body>
</html>
