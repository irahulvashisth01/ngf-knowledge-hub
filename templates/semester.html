<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Semesters - NotesHub</title>

<link rel="icon" href="{{ url_for('static', filename='icons/image.png') }}">

<!-- FONT AWESOME -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ===== RESET ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

/* ===== BODY ===== */
body {
  min-height: 100vh;
  background: linear-gradient(135deg, #4f46e5, #06b6d4);
  color: white;
}

/* ===== NAVBAR ===== */
.navbar {
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
}

.logo {
  font-size: 22px;
  font-weight: bold;
}

.nav-links a {
  color: white;
  margin-left: 15px;
  text-decoration: none;
}

/* ===== WRAPPER ===== */
.semester-wrapper {
  padding: 40px 20px;
  text-align: center;
}

/* HEADER */
.semester-header h1 {
  font-size: 32px;
  margin-bottom: 10px;
}

.semester-header p {
  color: #e5e7eb;
  margin-bottom: 30px;
}

/* ===== GRID ===== */
.semester-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap: 20px;
}

/* ===== CARD ===== */
.semester-card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(12px);
  padding: 25px;
  border-radius: 15px;
  transition: 0.3s;
  box-shadow: 0 8px 25px rgba(0,0,0,0.2);
}

.semester-card:hover {
  transform: translateY(-8px) scale(1.03);
}

/* ICON */
.sem-icon {
  font-size: 40px;
  margin-bottom: 10px;
}

/* TEXT */
.semester-card h3 {
  margin: 10px 0;
}

/* BUTTON */
.sem-btn {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 18px;
  background: #3b82f6;
  color: white;
  border-radius: 8px;
  text-decoration: none;
  transition: 0.3s;
}

.sem-btn:hover {
  background: #2563eb;
}

/* ===== MOBILE ===== */
@media(max-width: 600px) {
  .semester-header h1 {
    font-size: 24px;
  }
}

</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">📚 NotesHub</div>

  <div class="nav-links">
    <a href="/dashboard">Dashboard</a>
    <a href="/btech">Notes</a>
    <a href="/logout">Logout</a>
    <a href="/contact">Contact</a>
    <a href="/privacy">Privacy</a>
    <a href="/terms">Terms</a>
    <a href="/disclaimer">Disclaimer</a>
  </div>
</div>

<!-- CONTENT -->
<div class="semester-wrapper">

  <div class="semester-header">
    <h1>🎓 B.Tech CSE Notes</h1>
    <p>Select your semester to explore notes</p>
  </div>

  <div class="semester-grid">

    {% for i in range(1,9) %}
    <div class="semester-card">
      <div class="sem-icon">📘</div>
      <h3>Semester {{ i }}</h3>
      <p>Explore subjects & notes</p>
      <a href="/semester/{{i}}" class="sem-btn">Explore</a>
    </div>
    {% endfor %}

  </div>

</div>

</body>
</html>
