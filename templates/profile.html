{% extends "base.html" %}

{% block title %}Profile{% endblock %}

{% block content %}

<div class="profile-container">

    <h2>👤 My Profile</h2>

    <div class="profile-card">
        <p><strong>Name:</strong> {{ user }}</p>
        <p><strong>Role:</strong> {{ session.get('role') }}</p>
    </div>

    <a href="/logout" class="logout-btn">Logout</a>

</div>

{% endblock %}
