<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Subjects - NotesHub</title>

<link rel="icon" href="{{ url_for('static', filename='icons/image.png') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<meta name="theme-color" content="#111827">

<style>

/* ===== RESET ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: linear-gradient(135deg, #4f46e5, #06b6d4);
  color: white;
  padding-top: 70px;
}

/* ===== NAVBAR ===== */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(17,24,39,0.9);
  backdrop-filter: blur(10px);
  padding: 14px 25px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 1000;
}

.logo {
  font-size: 22px;
  font-weight: bold;
}

.nav-links a {
  color: #d1d5db;
  margin-left: 15px;
  text-decoration: none;
  transition: 0.3s;
}

.nav-links a:hover {
  color: white;
}

/* ===== CONTAINER ===== */
.container {
  padding: 40px 20px;
  text-align: center;
  max-width: 1200px;
  margin: auto;
}

.container h2 {
  font-size: 30px;
  margin-bottom: 30px;
}

/* ===== GRID ===== */
.grid {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 25px;
}

/* ===== CARD ===== */
.card {
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(15px);
  padding: 30px;
  border-radius: 18px;
  text-decoration: none;
  color: white;
  transition: 0.3s;
  box-shadow: 0 8px 25px rgba(0,0,0,0.2);
  position: relative;
  font-size: 18px;
  font-weight: 500;
}

/* ICON */
.card::before {
  content: "📚";
  font-size: 30px;
  display: block;
  margin-bottom: 10px;
}

/* HOVER */
.card:hover {
  transform: translateY(-8px) scale(1.04);
  box-shadow: 0 12px 30px rgba(0,0,0,0.3);
}

/* ===== MOBILE APP STYLE ===== */
.mobile-nav {
  display: none;
}

@media(max-width: 768px) {

  body {
    padding-bottom: 70px;
  }

  .grid {
    grid-template-columns: 1fr;
  }

  .nav-links {
    display: none;
  }

  .container h2 {
    font-size: 24px;
  }

  /* MOBILE NAV */
  .mobile-nav {
    display: flex;
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #111827;
    justify-content: space-around;
    padding: 10px 0;
  }

  .mobile-nav a {
    color: #9ca3af;
    text-align: center;
    font-size: 12px;
    text-decoration: none;
  }

  .mobile-nav i {
    display: block;
    font-size: 18px;
  }

}

</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">📚 NotesHub</div>

  <div class="nav-links">
    <a href="/dashboard">Dashboard</a>
    <a href="/btech">Semesters</a>
    <a href="/logout">Logout</a>
  </div>
</div>

<!-- CONTENT -->
<div class="container">

  <h2>📘 Semester {{sem}} Subjects</h2>

  <div class="grid">
    {% for sub in subjects %}
      <a href="/notes/{{sub}}/{{sem}}" class="card">
        {{sub}}
      </a>
    {% endfor %}
  </div>

</div>

<!-- MOBILE NAV -->
<div class="mobile-nav">
  <a href="/"><i class="fas fa-home"></i>Home</a>
  <a href="/btech"><i class="fas fa-book"></i>Notes</a>
  <a href="/upload"><i class="fas fa-upload"></i>Upload</a>
  <a href="/dashboard"><i class="fas fa-user"></i>Profile</a>
</div>

</body>
</html>
