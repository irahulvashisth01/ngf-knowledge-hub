<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Contact - NotesHub</title>

<link rel="icon" href="{{ url_for('static', filename='icons/image.png') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<meta name="theme-color" content="#111827">

<style>

/* ===== RESET ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: #f9fafb;
  color: #111827;
}

/* ===== NAVBAR ===== */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  background: #111827;
  color: white;
  padding: 14px 25px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 1000;
}

.logo {
  font-size: 20px;
  font-weight: bold;
}

.nav-links a {
  color: #d1d5db;
  margin-left: 15px;
  text-decoration: none;
}

.nav-links a:hover {
  color: white;
}

/* ===== CONTAINER ===== */
.container {
  max-width: 1100px;
  margin: 100px auto 40px;
  padding: 20px;
}

/* ===== GRID ===== */
.contact-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 30px;
}

/* ===== CARD ===== */
.card {
  background: white;
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* HEADINGS */
h1 {
  margin-bottom: 20px;
}

h2 {
  margin-bottom: 15px;
}

/* INFO ITEMS */
.info p {
  margin: 10px 0;
  color: #374151;
}

/* FORM */
input, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
  outline: none;
}

textarea {
  resize: none;
  height: 120px;
}

/* BUTTON */
.btn {
  margin-top: 15px;
  padding: 12px;
  background: linear-gradient(45deg,#3b82f6,#6366f1);
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  transform: translateY(-2px);
}

/* ===== MOBILE ===== */
.mobile-nav {
  display: none;
}

@media(max-width: 768px) {

  .contact-grid {
    grid-template-columns: 1fr;
  }

  .container {
    margin-top: 80px;
  }

  .nav-links {
    display: none;
  }

  /* MOBILE NAV */
  .mobile-nav {
    display: flex;
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #111827;
    justify-content: space-around;
    padding: 10px 0;
  }

  .mobile-nav a {
    color: #9ca3af;
    text-align: center;
    font-size: 12px;
    text-decoration: none;
  }

  .mobile-nav i {
    display: block;
    font-size: 18px;
  }

}

</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">📚 NotesHub</div>

  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/btech">Notes</a>
    <a href="/privacy">Privacy</a>
  </div>
</div>

<!-- CONTENT -->
<div class="container">

  <h1>📬 Contact Us</h1>

  <div class="contact-grid">

    <!-- CONTACT INFO -->
    <div class="card info">
      <h2>📍 Get in Touch</h2>

      <p><strong>👤 Name:</strong> Rahul Vashisth</p>
      <p><strong>📧 Email:</strong> rahulvashistha97@gmail.com</p>
      <p><strong>📞 Phone:</strong> +91 7056212054</p>
      <p><strong>📍 Location:</strong> Haryana, India</p>

      <p style="margin-top:15px;">
        Have questions, feedback, or suggestions?  
        Feel free to reach out anytime 🚀
      </p>
    </div>

    <!-- CONTACT FORM -->
    <div class="card">
      <h2>✉️ Send Message</h2>

      <form method="POST">

        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <textarea name="message" placeholder="Write your message..." required></textarea>

        <button class="btn">Send Message</button>

      </form>
    </div>

  </div>

</div>

<!-- MOBILE NAV -->
<div class="mobile-nav">
  <a href="/"><i class="fas fa-home"></i>Home</a>
  <a href="/btech"><i class="fas fa-book"></i>Notes</a>
  <a href="/dashboard"><i class="fas fa-user"></i>Profile</a>
</div>

</body>
</html>
